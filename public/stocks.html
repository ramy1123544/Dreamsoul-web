<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Soul — سوق الأسهم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <link rel="stylesheet" href="css/site-shell.css">
  <link rel="stylesheet" href="css/stocks-redesign.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">GT</span>
      <div>
        <div class="logo-title">Dream Soul</div>
        <div class="logo-sub">نظام اقتصادي متكامل</div>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="stocks.html" class="active">الأسهم</a>
      <a href="leaderboard.html">المتصدرون</a>
      <a href="shop.html">المتجر</a>
    </nav>
    <div class="live-badge">
      <span class="live-dot"></span> مباشر
    </div>
    <div id="auth-btn"></div>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="section-header">
      <h2>📈 سوق الأسهم</h2>
      <div class="live-badge-sm"><span class="live-dot-sm"></span> يتحدث كل 30 ثانية</div>
    </div>

    <!-- Market Heatmap (D3.js) -->
    <div class="heatmap-card">
      <div class="heatmap-title">🗺️ خريطة السوق الحرارية <span class="heatmap-hint">حجم المربع = حجم الحركة</span></div>
      <div id="market-heatmap" class="heatmap-stage"></div>
    </div>

    <!-- Stocks List -->
    <div class="stock-list" id="stocks-grid">
      <div class="loading-text">جاري تحميل الأسهم...</div>
    </div>

    <!-- Selected Stock Chart -->
    <div class="chart-section" id="chart-section" style="display:none">
      <div class="chart-header">
        <div>
          <h3 id="chart-title">—</h3>
          <div id="chart-sub" class="chart-sub">—</div>
        </div>
        <div class="chart-price-box">
          <div class="chart-price" id="chart-price">—</div>
          <div class="chart-change" id="chart-change">—</div>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="stockChart" height="100"></canvas>
      </div>
      <div class="chart-stats-row">
        <div class="chart-stat"><div class="cs-label">سعر البداية</div><div class="cs-val" id="cs-base">—</div></div>
        <div class="chart-stat"><div class="cs-label">أعلى سعر</div><div class="cs-val green" id="cs-high">—</div></div>
        <div class="chart-stat"><div class="cs-label">أقل سعر</div><div class="cs-val red" id="cs-low">—</div></div>
        <div class="chart-stat"><div class="cs-label">التذبذب</div><div class="cs-val" id="cs-vol">—</div></div>
      </div>
    </div>

  </div>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <span class="logo-title">Dream Soul</span>
    <span>نظام اقتصادي لعالم ديسكورد</span>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/stocks.js"></script>
<script src="js/stocks-heatmap.js"></script>
<script src="js/auth.js"></script>
<script src="js/site-shell.js"></script>
</body>
</html>
